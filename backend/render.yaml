services:
  - type: web
    name: jewellery-crm-backend
    env: python
    plan: starter
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: crm-final-mfe4.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://crm-final-five.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://crm-final-five.vercel.app
      - key: STATIC_URL
        value: /static/
      - key: MEDIA_URL
        value: /media/
      - key: STATIC_ROOT
        value: staticfiles
      - key: MEDIA_ROOT
        value: media
    healthCheckPath: /api/health/
    autoDeploy: true

databases:
  - name: jewellery-crm-db
    databaseName: jewellery_crm
    user: jewellery_crm_user
    plan: starter
