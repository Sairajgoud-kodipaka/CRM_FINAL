services:
  - type: web
    name: jewellery-crm-backend
    env: docker
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        value: f3Csh9SZNGRp84-xLGvEEYPhWqTt2_q6-5lXuXjiR5Y
      - key: ALLOWED_HOSTS
        value: crm-final-tj4n.onrender.com,crm-final-mfe4.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001,https://jewel-crm.vercel.app,https://crm-final-mfe4.onrender.com,https://crm-final-tj4n.onrender.com,https://jewellery-crm-frontend.vercel.app
      - key: CORS_ALLOW_ALL_ORIGINS
        value: false
      - key: CSRF_TRUSTED_ORIGINS
        value: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001,https://jewel-crm.vercel.app,https://crm-final-mfe4.onrender.com,https://crm-final-tj4n.onrender.com,https://jewellery-crm-frontend.vercel.app
      - key: DATABASE_URL
        value: postgresql://crm_db_pyoz_user:AHX6yNDH5S6MrdPxf7gsxJhKurS7Q0BO@dpg-d3k73ss9c44c73a7q2d0-a/crm_db_pyoz
      - key: JWT_SECRET_KEY
        value: "25CBSetI1cCv7Zfy0Wfl9bd6YB/Ws7l/dZnRVFWBVzg="
      - key: JWT_ACCESS_TOKEN_LIFETIME
        value: 60
      - key: JWT_REFRESH_TOKEN_LIFETIME
        value: 1440
      - key: STATIC_URL
        value: /static/
      - key: MEDIA_URL
        value: /media/
      - key: STATIC_ROOT
        value: staticfiles
      - key: MEDIA_ROOT
        value: media
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: SECURE_HSTS_SECONDS
        value: 31536000
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: true
      - key: SECURE_HSTS_PRELOAD
        value: true
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: CSRF_COOKIE_SECURE
        value: true
      - key: SECURE_BROWSER_XSS_FILTER
        value: true
      - key: SECURE_CONTENT_TYPE_NOSNIFF
        value: true
      - key: X_FRAME_OPTIONS
        value: DENY
      - key: SECURE_REFERRER_POLICY
        value: strict-origin-when-cross-origin
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: GUNICORN_CMD_ARGS
        value: "--timeout=300 --workers=2 --preload"
      - key: REDIS_HOST
        value: 127.0.0.1
      - key: REDIS_PORT
        value: 6379
      - key: GOOGLE_SHEETS_CREDENTIALS_JSON
        value: 'PASTE_YOUR_ACTUAL_JSON_CONTENT_HERE'
      - key: GOOGLE_SHEETS_ID
        value: '1W9JFanGBpl5DpFDcGELl3iLCvGnj35rWK0VLxvTS5t0'
    healthCheckPath: /api/health/
    autoDeploy: true
    buildFilter:
      paths:
        - backend/**
        - backend/Dockerfile
        - backend/requirements.txt
        - backend/manage.py
        - backend/core/settings.py
    routes:
      - type: rewrite
        source: /api/(.*)
        destination: /api/$1
    scaling:
      minInstances: 1
      maxInstances: 3
      targetConcurrency: 50
      targetCpuUtilizationPercentage: 70
    # Add startup probe configuration
    healthCheckGracePeriod: 300
    healthCheckInterval: 30
    healthCheckTimeout: 10

databases:
  - name: jewellery-crm-db-managed
    databaseName: crm_db_pyoz
    user: crm_db_pyoz_user
    plan: starter
    ipAllowList: []
